title: PowerShell Suspicious Execution - High Confidence
id: 2a9e6c14-3f7b-4d81-b0e5-9c1a7f3e2d48
status: experimental
description: |
  Detects PowerShell with high-confidence indicators of malicious execution.
  Fires when any of: a suspicious parent is present alongside two or more behavioral
  indicators; in-memory execution and evasion appear together; or a fetch primitive is
  fused with in-memory execution (the classic download cradle). The latter two combinations
  are high-signal regardless of parent.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: William Richardson
date: 2026-06-20
modified: 2026-06-20
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  susp_parent:
    ParentImage|endswith:
      - '\wmiprvse.exe'
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\mspub.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\w3wp.exe'
      - '\sqlservr.exe'
  indicator_fetch:
    CommandLine|contains:
      - 'Net.WebClient'
      - '.DownloadString'
      - '.DownloadFile'
      - '.DownloadData'
      - 'Invoke-WebRequest'
      - 'Invoke-RestMethod'
      - 'iwr'
      - 'irm'
      - 'Start-BitsTransfer'
      - 'Net.Http.HttpClient'
      - '[Net.WebRequest]::Create'
      - 'Msxml2.XMLHTTP'
      - 'WinHttp.WinHttpRequest'
  indicator_evasion:
    CommandLine|windash|contains:
      - '-EncodedCommand'
      - '-enc'
      - '-ec'
      - '-WindowStyle Hidden'
      - '-w hidden'
      - '-ExecutionPolicy Bypass'
      - '-ep bypass'
      - '-exec bypass'
      - '-NoProfile'
      - '-nop'
      - '-NonInteractive'
      - '-noni'
      - 'FromBase64String'
  indicator_memory:
    CommandLine|contains:
      - 'IEX'
      - 'Invoke-Expression'
      - '[ScriptBlock]::Create'
  condition: selection and (
      (susp_parent and 2 of indicator_*) or
      (indicator_memory and indicator_evasion) or
      (indicator_fetch and indicator_memory)
    )
falsepositives:
  - Legitimate PowerShell scripts executed by administrators or automated tasks
  - Security software or monitoring tools that utilise PowerShell for management
  - Developers running PowerShell scripts during development or testing
level: high