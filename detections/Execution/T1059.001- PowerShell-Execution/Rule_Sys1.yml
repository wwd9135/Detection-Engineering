title: PowerShell Suspicious Execution - Medium Confidence
id: 7d3f1a92-8c4b-4e6a-9f2d-1b5c8e0a4f63
status: experimental
description: |
  Detects PowerShell spawned from a suspicious parent process with at least one
  additional behavioral indicator (download, evasion, or in-memory execution primitive).
  Adversaries commonly use PowerShell for executing scripts and commands.
  Medium confidence: one supporting indicator present alongside a suspicious parent.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: William Richardson
date: 2026-06-20
modified: 2026-06-20
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  susp_parent:
    ParentImage|endswith:
      - '\wmiprvse.exe'
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\mspub.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\w3wp.exe'
      - '\sqlservr.exe'
  indicator_fetch:
    CommandLine|contains:
      - 'Net.WebClient'
      - '.DownloadString'
      - '.DownloadFile'
      - '.DownloadData'
      - 'Invoke-WebRequest'
      - 'Invoke-RestMethod'
      - 'iwr'
      - 'irm'
      - 'Start-BitsTransfer'
      - 'Net.Http.HttpClient'
      - '[Net.WebRequest]::Create'
      - 'Msxml2.XMLHTTP'
      - 'WinHttp.WinHttpRequest'
  indicator_evasion:
    CommandLine|windash|contains:
      - '-EncodedCommand'
      - '-enc'
      - '-ec'
      - '-WindowStyle Hidden'
      - '-w hidden'
      - '-ExecutionPolicy Bypass'
      - '-ep bypass'
      - '-exec bypass'
      - '-NoProfile'
      - '-nop'
      - '-NonInteractive'
      - '-noni'
      - 'FromBase64String'
  indicator_memory:
    CommandLine|contains:
      - 'IEX'
      - 'Invoke-Expression'
      - '[ScriptBlock]::Create'
  condition: selection and susp_parent and 1 of indicator_*
falsepositives:
  - Legitimate PowerShell scripts executed by administrators or automated tasks
  - Security software or monitoring tools that utilise PowerShell for management
  - Developers running PowerShell scripts during development or testing
level: medium

