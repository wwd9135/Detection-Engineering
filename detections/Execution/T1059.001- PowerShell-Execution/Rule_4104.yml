title: PowerShell Script Block Logging via Windows Event ID 4104
id: 2b3c4d5e-6f7a-8b9c-0d1e-2f3a4b5c6d7e
status: experimental
description: |
  Detects PowerShell script block logging events via Windows Event ID 4104.
  Adversaries commonly use PowerShell for executing scripts and commands.
  Built to reveal decoded content that attackers tried to obfuscate via -EncodedCommand
  or similar. EID 4104 logs the decoded ScriptBlockText, bypassing encoding evasion.
  Covers in-memory execution (IEX/Invoke/[ScriptBlock]::Create) and fetch-based staging.

references:
  - https://attack.mitre.org/techniques/T1059/001/
author: William Richardson
date: 2026-06-20
modified: 2026-06-22
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: powershell
detection:
  selection:
    EventID: 4104
  susp_parent:
    HostApplication|endswith:
      - '\wmiprvse.exe'
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\mspub.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\w3wp.exe'
      - '\sqlservr.exe'
  indicator_fetch:
    ScriptBlockText|contains:
      - 'Net.WebClient'
      - '.DownloadString'
      - '.DownloadFile'
      - '.DownloadData'
      - 'Invoke-WebRequest'
      - 'Invoke-RestMethod'
      - 'iwr'
      - 'irm'
      - 'Start-BitsTransfer'
      - 'Net.Http.HttpClient'
      - '[Net.WebRequest]::Create'
      - 'Msxml2.XMLHTTP'
      - 'WinHttp.WinHttpRequest'
  indicator_memory:
    ScriptBlockText|contains:
      - 'IEX'
      - 'Invoke-Expression'
      - 'Invoke-Command'
      - 'Invoke-ScriptBlock'
      - 'Invoke-Item'
      - '[ScriptBlock]::Create'
  indicator_evasion:
    ScriptBlockText|contains:
      - '-EncodedCommand'
      - '-enc'
      - '-ec'
      - '-WindowStyle Hidden'
      - '-w hidden'
      - '-ExecutionPolicy Bypass'
      - '-ep bypass'
      - '-exec bypass'
      - '-NoProfile'
      - '-nop'
      - '-NonInteractive'
      - '-noni'
      - 'FromBase64String'
  condition: selection and (
    (susp_parent and 2 of indicator_*) or
    (indicator_memory and indicator_evasion) or
    (indicator_fetch and indicator_memory)
    )

falsepositives:
  - Legitimate PowerShell scripts executed by administrators or automated tasks
  - Security software or monitoring tools that utilize PowerShell for management
  - Developers running PowerShell scripts during development or testing
level: high
